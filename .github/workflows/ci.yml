name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify pre-generated downloads
        # 5 builder-generated variants in lib/builders/:
        #   enterprise-master-profile, v3, v3-elixax-last, freelance, freelance-slim
        run: test $(ls public/downloads/*.docx | wc -l) -eq 5 || (echo "Expected 5 .docx files in public/downloads" && exit 1)
